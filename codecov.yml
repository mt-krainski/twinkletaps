coverage:
  status:
    project:
      default:
        target: auto
    patch:
      default:
        target: auto

comment:
  layout: reach,diff,flags

component_management:
  individual_components:
    - component_id: twinkletaps-app
      name: twinkletaps-app
      paths:
        - twinkletaps-app/**
    - component_id: hivemq-auth-extension
      name: hivemq-auth-extension
      paths:
        - hivemq-auth-extension/**
    - component_id: agent-utils
      name: agent-utils
      paths:
        - agent-utils/**
    - component_id: cursor-retro
      name: cursor-retro
      paths:
        - cursor-retro/**
    - component_id: jira-utils
      name: jira-utils
      paths:
        - jira-utils/**
    - component_id: ticket-loop
      name: ticket-loop
      paths:
        - ticket-loop/**

flags:
  unit-storybook:
    carryforward: true
    paths:
      - twinkletaps-app/src/
  integration:
    carryforward: true
    paths:
      - twinkletaps-app/src/
  hivemq-auth-extension:
    carryforward: true
    paths:
      - hivemq-auth-extension/src/main/
  agent-utils:
    carryforward: true
    paths:
      - agent-utils/agent_utils/
  cursor-retro:
    carryforward: true
    paths:
      - cursor-retro/cursor_retro/
  jira-utils:
    carryforward: true
    paths:
      - jira-utils/jira_utils/
  ticket-loop:
    carryforward: true
    paths:
      - ticket-loop/ticket_loop/
