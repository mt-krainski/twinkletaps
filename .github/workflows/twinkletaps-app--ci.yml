name: twinkletaps-app CI
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  install-dependencies:
    uses: ./.github/workflows/twinkletaps-app--install-dependencies.yml

  lint:
    needs: install-dependencies
    uses: ./.github/workflows/twinkletaps-app--lint.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}

  build:
    needs: install-dependencies
    uses: ./.github/workflows/twinkletaps-app--build.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}

  test:
    needs: install-dependencies
    uses: ./.github/workflows/twinkletaps-app--test.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}
    secrets: inherit

  integration:
    needs: install-dependencies
    uses: ./.github/workflows/twinkletaps-app--integration.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}
    secrets: inherit

  e2e:
    needs: install-dependencies
    uses: ./.github/workflows/twinkletaps-app--e2e.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}

  dependabot:
    name: Dependabot auto-merge
    needs: [lint, build, test, integration, e2e]
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' && github.event_name == 'pull_request' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
