name: twinkletaps-app Integration Tests
on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:54322/postgres"
    defaults:
      run:
        working-directory: twinkletaps-app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore dependencies from cache
        uses: actions/cache@v5
        with:
          path: twinkletaps-app/node_modules
          key: ${{ inputs.cache-key }}

      - name: Generate Prisma client
        run: npx prisma generate

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          supabase start --debug
          sleep 10
          npx supabase status --output env > .env.local
          cat .env.local
          source .env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> $GITHUB_ENV

      - name: Start HiveMQ broker
        working-directory: hivemq-deployment
        env:
          TWINKLETAPS_AUTH_URL: "http://127.0.0.1:3000/api/mqtt/auth"
          TWINKLETAPS_AUTH_SECRET: "test-auth-secret"
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
          echo "Waiting for HiveMQ to be healthy..."
          RETRIES=30
          while [ $RETRIES -gt 0 ]; do
            if bash -c 'echo > /dev/tcp/localhost/1883' 2>/dev/null; then
              echo "HiveMQ is ready (port 1883 open)"
              break
            fi
            RETRIES=$((RETRIES - 1))
            sleep 2
          done
          if [ $RETRIES -eq 0 ]; then
            echo "ERROR: HiveMQ did not become ready"
            docker compose logs
            exit 1
          fi

      - name: Start Next.js dev server
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          MQTT_AUTH_SECRET: test-auth-secret
          MQTT_PUBLISHER_USERNAME: ci-publisher
          MQTT_PUBLISHER_PASSWORD: ci-publisher-pass
          MQTT_BROKER_URL: mqtt://localhost:1883
        run: |
          npm run dev -- --hostname 0.0.0.0 > /tmp/nextjs.log 2>&1 &
          echo "Waiting for Next.js dev server..."
          RETRIES=30
          while [ $RETRIES -gt 0 ]; do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "Next.js is ready"
              break
            fi
            RETRIES=$((RETRIES - 1))
            sleep 2
          done
          if [ $RETRIES -eq 0 ]; then
            echo "ERROR: Next.js did not start"
            cat /tmp/nextjs.log
            exit 1
          fi

      - name: Verify MQTT auth endpoint
        run: |
          echo "=== Testing auth endpoint with publisher credentials ==="
          curl -v -X POST http://localhost:3000/api/mqtt/auth \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer test-auth-secret" \
            -d '{"username": "ci-publisher", "password": "ci-publisher-pass"}' || true
          echo ""
          echo "=== Testing auth endpoint without auth header ==="
          curl -v -X POST http://localhost:3000/api/mqtt/auth \
            -H "Content-Type: application/json" \
            -d '{"username": "ci-publisher", "password": "ci-publisher-pass"}' || true

      - name: Run integration tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          MQTT_BROKER_URL: mqtt://localhost:1883
          MQTT_PUBLISHER_USERNAME: ci-publisher
          MQTT_PUBLISHER_PASSWORD: ci-publisher-pass
          MQTT_AUTH_SECRET: test-auth-secret
        run: npm run test:integration:coverage

      - name: Dump logs on failure
        if: failure()
        working-directory: hivemq-deployment
        run: |
          echo "=== HiveMQ container logs ==="
          docker compose logs 2>&1 || true
          echo ""
          echo "=== Next.js dev server logs ==="
          cat /tmp/nextjs.log 2>/dev/null || echo "No Next.js log file found"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./twinkletaps-app/coverage/lcov.info
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
