name: twinkletaps-app End to End Tests
on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:54322/postgres"
    defaults:
      run:
        working-directory: twinkletaps-app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore dependencies from cache
        uses: actions/cache@v5
        with:
          path: twinkletaps-app/node_modules
          key: ${{ inputs.cache-key }}

      - name: Generate Prisma client
        run: npx prisma generate

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          supabase start --debug
          sleep 10
          npx supabase status --output env > .env.local
          cat .env.local
          source .env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_INBUCKET_URL=$INBUCKET_URL" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> $GITHUB_ENV

      - name: Start HiveMQ broker
        working-directory: hivemq-deployment
        env:
          TWINKLETAPS_AUTH_URL: "http://host.docker.internal:3000/api/mqtt/auth"
          TWINKLETAPS_AUTH_SECRET: "test-auth-secret"
        run: |
          docker compose up -d --build
          echo "Waiting for HiveMQ to be healthy..."
          RETRIES=30
          while [ $RETRIES -gt 0 ]; do
            if bash -c 'echo > /dev/tcp/localhost/1883' 2>/dev/null; then
              echo "HiveMQ is ready (port 1883 open)"
              break
            fi
            RETRIES=$((RETRIES - 1))
            sleep 2
          done
          if [ $RETRIES -eq 0 ]; then
            echo "ERROR: HiveMQ did not become ready"
            docker compose logs
            exit 1
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('twinkletaps-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright dependencies
        run: |
          npx playwright install --with-deps

      - name: Run e2e tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_INBUCKET_URL: ${{ env.SUPABASE_INBUCKET_URL }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_COMPANY_NAME: Test Company
          MQTT_AUTH_SECRET: test-auth-secret
          MQTT_PUBLISHER_USERNAME: ci-publisher
          MQTT_PUBLISHER_PASSWORD: ci-publisher-pass
          MQTT_BROKER_URL: mqtt://localhost:1883
        run: |
          npm run test:e2e

      - name: Dump logs on failure
        if: failure()
        working-directory: hivemq-deployment
        run: |
          echo "=== HiveMQ container logs ==="
          docker compose logs 2>&1 || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: twinkletaps-app/playwright-report/
          retention-days: 30
