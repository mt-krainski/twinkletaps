services:
  hivemq:
    build:
      context: ..
      dockerfile: hivemq-deployment/Dockerfile
    container_name: twinkletaps-hivemq
    ports:
      - "1883:1883"
      - "8000:8000"
    environment:
      HIVEMQ_ALLOW_ALL_CLIENTS: "${HIVEMQ_ALLOW_ALL_CLIENTS:-false}"
      TWINKLETAPS_AUTH_URL: "${TWINKLETAPS_AUTH_URL}"
      TWINKLETAPS_AUTH_SECRET: "${TWINKLETAPS_AUTH_SECRET}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1883'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
